name: Fork Sync

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fork-sync-main
  cancel-in-progress: false

jobs:
  sync-main:
    name: Merge upstream into fork main
    runs-on: ubuntu-latest
    steps:
      - name: Sync main
        shell: bash
        run: |
          set -euo pipefail

          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          upstream_url="https://github.com/NousResearch/hermes-agent.git"

          git clone "${repo_url}" repo
          cd repo

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream "${upstream_url}"
          git fetch origin main
          git fetch upstream main
          git checkout main

          before="$(git rev-parse HEAD)"
          upstream_head="$(git rev-parse upstream/main)"

          echo "fork main before: ${before}"
          echo "upstream main:    ${upstream_head}"

          if git merge-base --is-ancestor "${upstream_head}" HEAD; then
            echo "fork main already contains upstream main; nothing to sync"
            exit 0
          fi

          if ! git merge --no-edit upstream/main; then
            echo "Upstream merge conflicted. Resolve conflicts on fork main manually, then rerun this workflow."
            git status --short
            exit 1
          fi

          after="$(git rev-parse HEAD)"
          echo "fork main after:  ${after}"

          git push origin main
